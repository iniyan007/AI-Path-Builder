services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo-data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/enterprise_todo
      JWT_ACCESS_SECRET: change-me
      JWT_REFRESH_SECRET: change-me-too
      CLIENT_URL: http://localhost
    depends_on:
      - mongo

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo-data:
